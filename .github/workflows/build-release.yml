name: Build & Release

on:
  push:
    paths:
      - 'VERSION'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:

  # ── 1. Build firmware on Linux (fast + free) ────────────────────────────────
  build-firmware:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install platformio

    - name: Build firmware
      working-directory: atlantis-deepsea
      run: python3 -m platformio run

    - name: Collect boot_app0.bin from PlatformIO packages
      run: |
        BOOT=$(find ~/.platformio -name "boot_app0.bin" \
               | grep "arduinoespressif32" | head -1)
        echo "boot_app0 path: $BOOT"
        cp "$BOOT" boot_app0.bin

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-bins
        path: |
          atlantis-deepsea/.pio/build/lilygo-t-display/bootloader.bin
          atlantis-deepsea/.pio/build/lilygo-t-display/partitions.bin
          atlantis-deepsea/.pio/build/lilygo-t-display/firmware.bin
          boot_app0.bin


  # ── 2. Package single .exe on Windows ───────────────────────────────────────
  package-windows:
    runs-on: windows-latest
    needs: build-firmware

    steps:

    - uses: actions/checkout@v4

    - name: Download firmware artifacts
      uses: actions/download-artifact@v4
      with:
        name: firmware-bins
        path: flasher-workspace

    - name: Copy flasher script into workspace
      shell: bash
      run: |
        cp atlantis-deepsea/tools/flasher/flasher.py flasher-workspace/
        # Flatten any subdirectory from artifact download
        find flasher-workspace -name '*.bin' -exec cp {} flasher-workspace/ \;
        echo "Workspace contents:"
        ls -la flasher-workspace/

    - name: Install Python dependencies
      run: pip install pyinstaller esptool pyserial

    - name: Build single-file .exe with PyInstaller
      working-directory: flasher-workspace
      shell: bash
      run: |
        pyinstaller \
          --onefile \
          --console \
          --name "AtlantisDeepSea-Flasher" \
          --add-data "bootloader.bin;." \
          --add-data "partitions.bin;." \
          --add-data "boot_app0.bin;." \
          --add-data "firmware.bin;." \
          flasher.py

        echo "Build output:"
        ls -lh dist/

    - name: Upload .exe artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: flasher-workspace/dist/AtlantisDeepSea-Flasher.exe


  # ── 3. Publish GitHub Release ────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-firmware, package-windows]

    steps:

    - uses: actions/checkout@v4

    - name: Determine release tag
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event_name }}" = "push" ] && [ -f VERSION ]; then
          echo "value=$(head -1 VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
        else
          echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Download Windows .exe
      uses: actions/download-artifact@v4
      with:
        name: windows-exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.value }}
        name: "Atlantis DeepSea ${{ steps.tag.outputs.value }}"
        body: |
          ## Atlantis DeepSea — BIP85 Password Manager

          ### Windows — Two clicks to flash
          1. Download **`AtlantisDeepSea-Flasher.exe`** below
          2. Plug in your LilyGO T-Display via USB-C
          3. Double-click the .exe — it auto-detects the device and flashes

          > **Windows SmartScreen warning?**
          > Click **More info** → **Run anyway**.
          > This is a known prompt for unsigned open-source tools.

          > **Device not detected?**
          > Install the [CP210x USB driver](https://www.silabs.com/developers/usb-to-uart-bridge-vcp-drivers), restart Windows, then run the flasher again.

          ---
          ### macOS / Linux — Terminal
          ```bash
          git clone https://github.com/ak1ra00/hw-flash
          cd hw-flash/atlantis-deepsea
          chmod +x flash.sh && ./flash.sh
          ```
          Full guide: [FLASHING.md](https://github.com/ak1ra00/hw-flash/blob/main/atlantis-deepsea/FLASHING.md)
        files: AtlantisDeepSea-Flasher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
