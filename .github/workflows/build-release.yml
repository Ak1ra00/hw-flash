name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # also triggerable manually from GitHub Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Python, PlatformIO, esptool
      run: pip install platformio esptool

    - name: Build firmware
      working-directory: atlantis-deepsea
      run: pio run

    - name: Locate boot_app0.bin
      run: |
        BOOT=$(find ~/.platformio -name "boot_app0.bin" | grep "arduinoespressif32" | head -1)
        echo "boot_app0=${BOOT}" >> $GITHUB_ENV
        echo "Found boot_app0 at: ${BOOT}"

    - name: Download esptool for Windows (64-bit)
      run: |
        ESPTOOL_URL=$(curl -s https://api.github.com/repos/espressif/esptool/releases/latest \
          | python3 -c "
import sys, json
r = json.load(sys.stdin)
win = next((a['browser_download_url'] for a in r['assets'] if 'win64' in a['name'] and a['name'].endswith('.zip')), None)
if not win:
    win = next((a['browser_download_url'] for a in r['assets'] if 'windows' in a['name'].lower() and a['name'].endswith('.zip')), None)
print(win)
")
        echo "Downloading esptool: $ESPTOOL_URL"
        curl -L "$ESPTOOL_URL" -o esptool-win.zip
        unzip esptool-win.zip -d esptool-win
        find esptool-win -name "esptool.exe" -exec cp {} esptool.exe \;

    - name: Package Windows portable ZIP
      run: |
        mkdir -p AtlantisDeepSea-Windows

        # Firmware binaries
        cp atlantis-deepsea/.pio/build/lilygo-t-display/bootloader.bin  AtlantisDeepSea-Windows/
        cp atlantis-deepsea/.pio/build/lilygo-t-display/partitions.bin  AtlantisDeepSea-Windows/
        cp "${{ env.boot_app0 }}"                                        AtlantisDeepSea-Windows/boot_app0.bin
        cp atlantis-deepsea/.pio/build/lilygo-t-display/firmware.bin    AtlantisDeepSea-Windows/

        # Windows flasher tool
        cp esptool.exe                                    AtlantisDeepSea-Windows/
        cp atlantis-deepsea/tools/flasher/flash.bat       AtlantisDeepSea-Windows/
        cp atlantis-deepsea/tools/flasher/README.txt      AtlantisDeepSea-Windows/

        zip -r AtlantisDeepSea-Windows.zip AtlantisDeepSea-Windows/

        echo "Package contents:"
        unzip -l AtlantisDeepSea-Windows.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Atlantis DeepSea ${{ github.ref_name }}"
        body: |
          ## Atlantis DeepSea — BIP85 Password Manager

          ### Windows — No install required
          1. Download **`AtlantisDeepSea-Windows.zip`** below
          2. Extract the ZIP anywhere
          3. Plug in your LilyGO T-Display via USB-C
          4. Double-click **`flash.bat`**

          > First-time users: install the [CP210x USB driver](https://www.silabs.com/developers/usb-to-uart-bridge-vcp-drivers) if the device isn't detected.

          ### macOS / Linux — From source
          See [FLASHING.md](https://github.com/ak1ra00/hw-flash/blob/main/atlantis-deepsea/FLASHING.md) for full instructions.

          ---
          **Full guide:** [FLASHING.md](https://github.com/ak1ra00/hw-flash/blob/main/atlantis-deepsea/FLASHING.md)
        files: AtlantisDeepSea-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
