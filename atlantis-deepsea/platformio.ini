; Atlantis DeepSea - BIP85 Password Manager
; Target: LilyGO T-Display (ESP32 + 1.14" ST7789 LCD)

[env:lilygo-t-display]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -O2

extra_scripts = pre:setup_tft.py

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/T-vK/ESP32-BLE-Keyboard.git
